<main class="container">

    <section class="form-section">

        <div class="form-container auth-container">

            <h2>Criar Conta</h2>

            <p class="form-subtitle">
                Cadastre-se para participar das atividades e projetos culturais.
            </p>

            <form id="cadastroForm">

                <div class="form-group">
                    <label for="nome">
                        Nome Completo
                    </label>
                    <input
                        type="text"
                        id="nome"
                        required
                        placeholder="Digite seu nome completo">
                </div>

                <div class="form-group">
                    <label for="email">
                        E-mail
                    </label>
                    <input
                        type="email"
                        id="email"
                        required
                        placeholder="Digite seu e-mail">
                </div>

                <div class="form-group">
                    <label for="senha">
                        Senha
                    </label>
                    <input
                        type="password"
                        id="senha"
                        required
                        placeholder="Digite sua senha">
                </div>

                <div class="form-group">
                    <label for="confirmarSenha">
                        Confirmar Senha
                    </label>
                    <input
                        type="password"
                        id="confirmarSenha"
                        required
                        placeholder="Confirme sua senha">
                </div>

                <div class="form-group">
                    <label for="tipoUsuario">
                        Tipo de Usuário
                    </label>

                    <select id="tipoUsuario" required>
                        <option value="">Selecione</option>
                        <option value="Visitante">Visitante</option>
                        <option value="Artista">Artista</option>
                        <option value="Administrador">Administrador</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">
                    Cadastrar
                </button>

            </form>

            <div id="mensagemCadastro" class="auth-message"></div>

            <div class="form-footer-text">
                Já possui conta?<br>
                <a href="login.html">Clique aqui para entrar</a>
            </div>

        </div>

    </section>

</main>
